  _f('#050010',boss.w-20,-12,14,10);_f(flk?ac:'#6600aa',boss.w-19,-11,12,8);_f('#ffffff',boss.w-18,-10,4,3);
  // 口(裂けた)
  _f('#0a0018',10,-4,boss.w-20,10);_f('#330044',12,-2,boss.w-24,8);
  for(let k=0;k<5;k++)_f(ac,12+k*10,-4+k%2*2,8,5);
  if(boss.state==='charge'){ctx.globalAlpha=0.32+Math.random()*.14;_f('#ff00ff',-10,0,boss.w+20,boss.h);ctx.globalAlpha=1;}
  if(ph2){ctx.globalAlpha=0.18+Math.sin(t/75)*.09;_f('#ff88ff',-8,-4,boss.w+16,boss.h+8);ctx.globalAlpha=1;}
}

// ================================================================
//  ステージクリア画面
// ================================================================
function getStageRank(){
  const t=clearTime,hp=clearHp,sc=score;
  if(t<7200&&hp>=4&&sc>=2000)return'S';
  if(t<14400&&hp>=2&&sc>=1200)return'A';
  if(t<22000&&hp>=1)return'B';
  return'C';
}
function drawStageClear(){
  const isLast=currentStage>=TOTAL_STAGES;
  const scfg=STAGE_CFG[currentStage-1];
  const rank=getStageRank();
  const rankColMap={S:'#ffdd00',A:'#aaffaa',B:'#88aaff',C:'#cc8888'};
  const rankCol=rankColMap[rank]||'#888888';
  dr(0,0,W,H,'#020210');
  STARS.forEach(s=>{const sx=(s.x%W+W)%W;if(!(s.b&&Math.floor(frameTime/500)%2))dr(sx,s.y,s.s,s.s,'#fff');});
  ctx.textAlign='center';
  // ステージ番号バッジ
  dr(W/2-60,H*.08,120,22,'#0a1430');
  ctx.fillStyle='#5566aa';ctx.font=`bold ${Math.min(W*.018,12)}px monospace`;
  ctx.fillText(`STAGE ${currentStage} / ${TOTAL_STAGES}  ${scfg.name}`,W/2,H*.08+15);
  // タイトル
  ctx.fillStyle='#040418';ctx.font=`bold ${Math.min(W*.052,42)}px monospace`;ctx.fillText('STAGE  CLEAR',W/2+2,H*.22+2);
  ctx.fillStyle=isLast?'#ff88ff':'#ffee44';ctx.fillText('STAGE  CLEAR',W/2,H*.22);
  // 次ステージ予告 or ALL CLEAR
  if(isLast){
    ctx.fillStyle='#ff44ff';ctx.font=`bold ${Math.min(W*.024,18)}px monospace`;
    ctx.fillText('★ ALL STAGES COMPLETE! ★',W/2,H*.22+34);
  } else {
    const next=STAGE_CFG[currentStage];
    ctx.fillStyle='#7788cc';ctx.font=`${Math.min(W*.02,14)}px monospace`;
    ctx.fillText(`NEXT: STAGE ${currentStage+1} - ${next.name} [${next.bossName}]`,W/2,H*.22+34);
  }
  const rows=[
    ['STAGE', currentStage+'/'+TOTAL_STAGES,'#ffaa44'],
    ['SCORE',String(score).padStart(7,'0'),'#ffdd00'],
    ['TIME',Math.floor(clearTime/3600)+"'"+String(Math.floor(clearTime%3600/60)).padStart(2,'0')+'"','#aaffaa'],
    ['ORBS',orbsCollected.length+'/'+TOTAL_STAGES,'#88ddff'],
    ['CHARACTER',CHARS[selChar].nick,'#ffbbdd'],
    ['RANK',rank,rankCol],
  ];
  rows.forEach((r,i)=>{
    const isRank=r[0]==='RANK';
    dr(W/2-118,H*.33+i*24-10,236,isRank?28:22,'#0a0a22');
    ctx.fillStyle='#556688';ctx.font=`${Math.min(W*.015,11)}px monospace`;
    ctx.textAlign='left';ctx.fillText(r[0],W/2-108,H*.33+i*24+5);
    if(isRank){
      const fs=Math.min(W*.08,38);
      ctx.fillStyle=r[2];ctx.font=`bold ${fs}px monospace`;ctx.textAlign='right';
      ctx.fillText(r[1],W/2+108,H*.33+i*24+fs*.55);
      const desc={S:'PERFECT',A:'GREAT',B:'GOOD',C:'TRY AGAIN'}[r[1]]||'';
      ctx.fillStyle=r[2];ctx.font=`${Math.min(W*.018,11)}px monospace`;
      ctx.fillText(desc,W/2-10,H*.33+i*24+14);
    } else {
      ctx.fillStyle=r[2];ctx.font=`bold ${Math.min(W*.018,13)}px monospace`;
      ctx.textAlign='right';ctx.fillText(r[1],W/2+108,H*.33+i*24+5);
    }
  });
  const scores=getScores();
  if(scores.length){
    ctx.fillStyle='#334455';ctx.font=`bold ${Math.min(W*.015,10)}px monospace`;ctx.textAlign='center';
    ctx.fillText('── BEST SCORES ──',W/2,H*.65);
    scores.forEach((s,i)=>{
      ctx.fillStyle=i===0?'#ffcc00':'#7788aa';
      ctx.font=`${Math.min(W*.014,10)}px monospace`;ctx.textAlign='center';
      ctx.fillText(`${i+1}. ${s.char}  ${String(s.score).padStart(7,'0')}  ${s.date}`,W/2,H*.70+i*17);
    });
  }
  if(Math.floor(frameTime/500)%2){
    ctx.fillStyle=isLast?'#ff88ff':'#aabbff';
    ctx.font=`bold ${Math.min(W*.022,16)}px monospace`;ctx.textAlign='center';
    ctx.fillText(isLast?'>> PRESS START TO TITLE <<':'>> PRESS START - NEXT STAGE >>',W/2,H*.96);
  }
  scanlines();
}

// ================================================================
//  月面古代遺跡 背景
// ================================================================
function drawBg(){
  const scfg=STAGE_CFG[currentStage-1];
  dr(0,0,W,H,scfg?scfg.bgMain:'#01010a');

  const t=frameTime;
  const st=currentStage;

  if(st<=5){
  // 星雲ヒント (ステージ別カラー)
  ctx.globalAlpha=0.07;
  dr(W*.1,0,W*.32,H*.44,scfg.nebula[0]);
  dr(W*.58,H*.06,W*.28,H*.36,scfg.nebula[1]);
  ctx.globalAlpha=0.04;
  dr(W*.38,H*.12,W*.24,H*.3,scfg.nebula[0]);
  ctx.globalAlpha=1;

  // 星 (視差・カラーバリエーション・明るい星は光芒)
  STARS.forEach(s=>{
    const sx=((s.x-cam.x*s.p)%W+W)%W;
    if(s.b&&Math.floor(t/500)%2)return;
    const n=Math.floor(s.x*1.37+s.y)%9;
    const scol=n<2?'#aabbff':n<4?'#ffddaa':n<5?'#ccffee':'#eeeeff';
    if(s.s>1){
      ctx.globalAlpha=0.45;
      dr(sx-2,s.y,5,1,scol);dr(sx,s.y-2,1,5,scol);
      ctx.globalAlpha=1;
    }
    dr(sx,s.y,s.s,s.s,scol);
  });

  // 地球 (左上・遠景の青い球体)
  const EX=70,EY=52,ER=34;
  // 大気グロー (arc=真円)
  ctx.globalAlpha=0.07;ctx.fillStyle='#2255ff';
  ctx.beginPath();ctx.arc(EX,EY,ER+14,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.05;ctx.fillStyle='#1144dd';
  ctx.beginPath();ctx.arc(EX,EY,ER+7,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // 地球本体 pixel by pixel (海・陸・雲)
  for(let dy=-ER;dy<=ER;dy+=2)for(let dx=-ER;dx<=ER;dx+=2){
    const d2=dx*dx+dy*dy;if(d2>ER*ER)continue;
    const r=Math.sqrt(d2)/ER;
    const edge=r>0.86;
    const v=(dx*.65+dy*.4+ER*1.4)%16;
    const cloud=(dx*.5-dy*.35+ER)%12;
    let col;
    if(cloud<2.2)    col=edge?'#8ab4cc':'#c0d8f2';
    else if(v<5)     col=edge?'#0a2a10':'#1a6a28';
    else             col=edge?'#071535':'#1a4a90';
    ctx.fillStyle=col;ctx.fillRect(EX+dx,EY+dy,2,2);
  }
  // 大気の縁リング
  ctx.globalAlpha=0.20;ctx.strokeStyle='#4488ff';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(EX,EY,ER+1,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=1;
  // 光沢ハイライト
  ctx.globalAlpha=0.18;ctx.fillStyle='#ddeeff';
  ctx.beginPath();ctx.arc(EX-ER*.28,EY-ER*.28,ER*.26,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // 遠景月面山脈 (視差0.08・サイン合成)
  const hY=H-60;
  for(let sx=0;sx<W+4;sx+=4){
    const wx=sx+cam.x*0.08;
    const mh=Math.floor(26+Math.sin(wx*.011)*19+Math.sin(wx*.027)*11+Math.sin(wx*.006)*16);
    dr(sx,hY-mh,4,mh+2,'#060612');
  }
  } // end if(st<=5)

  if(st<=6){
  // 崩れた柱シルエット (詳細・グロー)
  PILLARS.forEach(p=>{
    const px=Math.floor(p.x-cam.x*.15);
    if(px<-40||px>W+40)return;
    const bw=22,bh=p.h,by=H-60-bh;
    // 柱本体
    dr(px-bw/2,by,bw,bh,'#09091a');
    dr(px-bw/2,by,bw,Math.floor(bh*.28),'#0b0b1c');
    // 欠け (崩壊表現)
    if(bh>100)dr(px+bw/2-5,by+Math.floor(bh*.27),5,8,'#01010a');
    // 頭部笠石
    dr(px-bw/2-3,by,bw+6,4,'#141428');
    dr(px-bw/2-3,by,bw+6,2,'#1a1a30');
    // 根元影
    dr(px-bw/2-2,by+bh-5,bw+4,5,'#080812');
    // 石目 (水平ライン)
    for(let ly=by+16;ly<by+bh-10;ly+=20)dr(px-bw/2+1,ly,bw-2,1,'#13131f');
    // 古代紋様グロー
    if(bh>130){
      const gl=Math.sin(t/1400+p.x*.003)*.5+.5;
      const gy=by+Math.floor(bh*.42);
      ctx.globalAlpha=0.07+gl*.12;
      dr(px-4,gy,8,2,'#3300cc');dr(px-2,gy-3,4,8,'#3300cc');
      dr(px-5,gy+8,10,1,'#5500ff');
      ctx.globalAlpha=1;
    }
  });
  } // end if(st<=6)

  // Stage 7: エネルギー導管 (石柱の代わり)
  if(st===7){
    for(let k=0;k<6;k++){
      const cx=Math.floor(((k*211+cam.x*.05)%(W+80)+W+80)%(W+80))-40;
      const ch=Math.floor(120+k*22);const cby=H-ch-20;
      const gl=Math.sin(t/800+k)*.3+.7;
      // 導管本体 (暗いテック色)
      dr(cx,cby,10,ch,'#081018');dr(cx+1,cby,8,ch,'#0c1828');dr(cx+2,cby,6,2,'#1a3050');
      // エネルギーライン (縦流れ)
      const ey=Math.floor((t/40+k*33)%ch);
      ctx.globalAlpha=gl*.5;dr(cx+4,cby+ey,2,Math.min(8,ch-ey),'#00aaff');ctx.globalAlpha=1;
      // 接続ノード
      for(let ny=cby+16;ny<cby+ch-16;ny+=30){ctx.globalAlpha=0.4+gl*.2;dr(cx-2,ny,14,4,'#003348');dr(cx,ny+1,10,2,'#0055aa');ctx.globalAlpha=1;}
    }
  }

  // ステージ固有の背景エフェクト
  if(st===2){ // 雷峰: 遠景に稲妻フラッシュ
    const lp=Math.floor(t/3200)%7;
    if(Math.floor(t/3200)*3200+800>t){
      ctx.globalAlpha=0.06+lp*.01;
      dr(W*(.2+lp*.1),0,3,H*.7,'#8899ff');
      ctx.globalAlpha=0.03;dr(W*(.2+lp*.1)-5,0,14,H*.5,'#4455cc');
      ctx.globalAlpha=1;
    }
    // 暗雲帯
    ctx.globalAlpha=0.09;dr(0,H*.05,W,H*.18,'#050510');ctx.globalAlpha=1;
  }
  if(st===3){ // 炎窟: 下部に溶岩グロー
    const fl=Math.sin(t/350)*.3+.7;
    ctx.globalAlpha=fl*.18;dr(0,H*.72,W,H*.28,'#ff4400');ctx.globalAlpha=1;
    ctx.globalAlpha=fl*.10;dr(0,H*.82,W,H*.18,'#ff8800');ctx.globalAlpha=1;
    // 揺れる炎パーティクル(背景)
    for(let k=0;k<8;k++){
      const fx=((k*137+t*.04)%W);
      const fy=H*.7+Math.sin(t/200+k)*(H*.05);
      ctx.globalAlpha=0.07;dr(fx,fy,4,12,'#ff6600');ctx.globalAlpha=1;
    }
  }
  if(st===4){ // 深海神殿: 海中コースティクス光
    for(let k=0;k<12;k++){
      const cx=((k*211+t*.015)%W);
      const cy=H*.2+Math.sin(t/400+k*0.8)*(H*.3);
      ctx.globalAlpha=0.04+Math.sin(t/300+k)*.02;
      dr(cx,cy,Math.floor(20+Math.sin(k)*10),2,'#22aaaa');ctx.globalAlpha=1;
    }
    // 深海の暗さ (下部)
    ctx.globalAlpha=0.12;dr(0,H*.5,W,H*.5,'#002a20');ctx.globalAlpha=1;
  }
  if(st===5){ // 月宮殿: 浮遊する光の玉
    for(let k=0;k<7;k++){
      const ox=((k*293+t*.008)%W);
      const oy=H*.15+Math.sin(t/600+k*1.1)*(H*.3);
      const gl=Math.sin(t/400+k)*.4+.6;
      ctx.globalAlpha=gl*.10;dr(ox-8,oy-8,16,16,'#aabbff');ctx.globalAlpha=1;
      ctx.globalAlpha=gl*.06;dr(ox-14,oy-14,28,28,'#8899ee');ctx.globalAlpha=1;
    }
  }
  if(st===6){ // 崩落回廊: 石壁・ひび割れ・崩落の砂埃
    // 石壁の質感 (縦ひび・視差)
    for(let k=0;k<9;k++){
      const cx=Math.floor(((k*127+cam.x*.04)%W+W)%W);
      ctx.globalAlpha=0.07;dr(cx,0,1,H,'#998866');
      ctx.globalAlpha=0.04;dr(cx+3,Math.floor(H*.08+k*9)%H,1,Math.floor(H*.35),'#664422');
      ctx.globalAlpha=1;
    }
    // 崩落の砂埃 (ゆっくり落下)
    for(let k=0;k<12;k++){
      const dx=((k*163+t*.006)%W);
      const dy=(H*.15+k*30+t*.03)%H;
      ctx.globalAlpha=0.04+Math.sin(t/600+k)*.02;
      dr(dx,dy,Math.floor(16+k*4),2,'#aa8855');ctx.globalAlpha=1;
    }
    // 遠景アーチ (廊下の奥)
    for(let k=0;k<3;k++){
      const ax=Math.floor(((k*200+cam.x*.06)%(W+100)+W+100)%(W+100))-50;
      ctx.globalAlpha=0.09;
      dr(ax,Math.floor(H*.18),5,Math.floor(H*.65),'#554433');
      dr(ax-14,Math.floor(H*.18),32,5,'#443322');
      ctx.globalAlpha=0.04;dr(ax-16,Math.floor(H*.18),36,Math.floor(H*.65),'#332211');
      ctx.globalAlpha=1;
    }
    // 割れ目グロー (古代エネルギー漏れ)
    for(let k=0;k<4;k++){
      const grx=((k*241+cam.x*.03)%(W+60)+W+60)%(W+60)-30;
      const gl=Math.sin(t/700+k*1.3)*.4+.5;
      ctx.globalAlpha=gl*.07;dr(grx,0,1,H,'#4400bb');ctx.globalAlpha=1;
    }
    // 天井の暗さ (屋内感)
    ctx.globalAlpha=0.18;dr(0,0,W,Math.floor(H*.2),'#000000');ctx.globalAlpha=1;
  }
  if(st===7){ // 機械神殿の核: エネルギーライン・コアグロー
    // 水平エネルギーライン
    for(let k=0;k<7;k++){
      const ey=Math.floor(H*(.08+k*.13));
      const ep=Math.floor((t/55+k*41)%W);
      ctx.globalAlpha=0.05+Math.sin(t/280+k)*.025;dr(0,ey,W,1,'#00bbcc');ctx.globalAlpha=1;
      ctx.globalAlpha=0.12;dr(ep,ey-1,Math.floor(W*.15),3,'#00ffcc');ctx.globalAlpha=1;
    }
    // 回路パターン (縦線)
    for(let k=0;k<8;k++){
      const cxp=Math.floor(((k*150+cam.x*.05)%(W+40)+W+40)%(W+40))-20;
      ctx.globalAlpha=0.05;dr(cxp,0,1,H,'#004466');ctx.globalAlpha=1;
      const ndy=Math.floor((t/30+k*27)%H);
      ctx.globalAlpha=0.15;dr(cxp-1,ndy,3,Math.min(14,H-ndy),'#00aaff');ctx.globalAlpha=1;
    }
    // コアグロー (中央パルス)
    const cg=Math.sin(t/380)*.4+.6;
    ctx.globalAlpha=cg*.09;dr(Math.floor(W*.25),Math.floor(H*.25),Math.floor(W*.5),Math.floor(H*.5),'#0055aa');ctx.globalAlpha=1;
    ctx.globalAlpha=cg*.05;dr(Math.floor(W*.1),Math.floor(H*.1),Math.floor(W*.8),Math.floor(H*.8),'#003388');ctx.globalAlpha=1;
    // 浮遊エネルギー粒子
    for(let k=0;k<9;k++){
      const ex2=((k*197+t*.012)%W);
      const ey2=H*.08+((k*89+t*.007)%(H*.78));
      const gl=Math.sin(t/380+k)*.5+.5;
      ctx.globalAlpha=gl*.1;dr(ex2,ey2,3,3,'#00ccff');ctx.globalAlpha=1;
    }
    // 全体に青みの暗さ
    ctx.globalAlpha=0.07;dr(0,0,W,H,'#000a18');ctx.globalAlpha=1;
  }
}

// ================================================================
//  地形描画 (古代遺跡石畳)
// ================================================================
function drawTerrain(){
  const scfg=STAGE_CFG[currentStage-1];
  const tM=scfg.tMain,tH=scfg.tHL,tH2=scfg.tHL2,tS=scfg.tSide,tA=scfg.tAcc;
  const t=frameTime;
  TERRAIN.forEach(ter=>{
    const tx=ter.x-cam.x;if(tx>W+60||tx+ter.w<-60)return;
    // 天井 (ceil)
    if(ter.type==='ceil'){
      dr(tx,ter.y,ter.w,ter.h,tM);
      for(let bx=tx;bx<tx+ter.w;bx+=32)dr(bx,ter.y,1,ter.h,'#0a0a12');
      dr(tx,ter.y+ter.h-3,ter.w,3,tH);dr(tx,ter.y+ter.h-1,ter.w,1,tH2);
      dr(tx,ter.y,2,ter.h,tS);dr(tx+ter.w-2,ter.y,2,ter.h,'#0a0a12');
      // 機械遺跡装飾: ステージ別
      if(currentStage===2){ // 雷峰: 稲妻装飾
        for(let gx=tx+20;gx<tx+ter.w-20;gx+=60){
          dr(gx,ter.y+ter.h-8,2,5,'#2a3860');dr(gx+3,ter.y+ter.h-10,2,5,'#2a3860');}
      }
      if(currentStage===3){ // 炎窟: 溶岩滴り装飾
        for(let gx=tx+16;gx<tx+ter.w-16;gx+=48){
          dr(gx,ter.y+ter.h-1,3,4,'#882200');dr(gx+1,ter.y+ter.h+2,1,3,'#ff4400');}
      }
      if(currentStage===4){ // 深海神殿: 珊瑚装飾
        for(let gx=tx+12;gx<tx+ter.w-12;gx+=44){
          dr(gx,ter.y+ter.h-1,2,5,'#0a3a20');dr(gx+1,ter.y+ter.h,1,4,'#1a6a30');}
      }
      return;
    }
    // 消え足場 (blink)
    if(ter.type==='blink'){
      const phase=((frameTime+(ter.phase||0))%1200);
      const alpha=phase<700?1:phase<800?(800-phase)/100:phase>1100?(phase-1100)/100:0;
      if(alpha<=0)return;
      ctx.globalAlpha=alpha;
      dr(tx,ter.y,ter.w,ter.h,'#0a1428');
      for(let bx2=tx;bx2<tx+ter.w;bx2+=24)dr(bx2,ter.y,1,ter.h,'#04080f');
      dr(tx,ter.y,ter.w,2,'#2255aa');dr(tx,ter.y,ter.w,1,'#44aaff');
      // 点滅エッジ光
      ctx.globalAlpha=alpha*(0.5+Math.sin(t/120)*.3);
      dr(tx,ter.y,ter.w,1,'#88ddff');
      dr(tx,ter.y+ter.h-1,ter.w,1,'#224488');
      ctx.globalAlpha=1;
      return;
    }
    // 崩れ足場 (trap)
    if(ter.type==='trap'){
      if(ter.trapState==='gone')return;
      const shk=ter.trapState==='shaking'?(Math.random()*4-2|0):0;
      const ty=ter.y+shk;
      dr(tx,ty,ter.w,ter.h,'#241808');
      for(let bx=tx;bx<tx+ter.w;bx+=24)dr(bx,ty,1,ter.h,'#0a0500');
      dr(tx,ty,ter.w,2,ter.trapState==='shaking'?'#cc4400':'#7a6030');
      dr(tx,ty,ter.w,1,ter.trapState==='shaking'?'#ff6622':'#aa8840');
      // ひび割れ
      const c1=tx+ter.w*.28|0,c2=tx+ter.w*.62|0;
      dr(c1,ty+1,1,9,'#110800');dr(c1+3,ty+4,1,5,'#110800');
      dr(c2,ty+2,1,8,'#110800');dr(c2-2,ty,1,6,'#110800');
      if(ter.trapState==='shaking'){
        ctx.globalAlpha=0.12+Math.sin(t/60)*.08;
        dr(tx,ty,ter.w,ter.h,'#ff3300');
        ctx.globalAlpha=1;
      }
      return;
    }
    const isG=ter.h>20;
    dr(tx,ter.y,ter.w,ter.h,isG?tM:'#12121e');
    // タイル割り石目
    const tile=isG?32:24;
    for(let bx=tx;bx<tx+ter.w;bx+=tile)dr(bx,ter.y,1,ter.h,'#0a0a12');
    // 上端ハイライト
    dr(tx,ter.y,ter.w,2,tH);dr(tx,ter.y,ter.w,1,tH2);
    // 側面影
    dr(tx,ter.y,2,ter.h,tS);dr(tx+ter.w-2,ter.y,2,ter.h,'#0a0a12');
    // ステージ別装飾
    if(currentStage===1&&isG){ // 遺跡: 苔・紋様
      for(let gx=tx+8;gx<tx+ter.w-8;gx+=48)dr(gx,ter.y+2,6,2,'#1a2a1a');
      if(ter.w>150){const gl=Math.floor(ter.x/500)%4,gx=tx+ter.w*.5,gy=ter.y+6;
        if(gl===0){dr(gx-3,gy,6,2,tA);dr(gx-1,gy-2,2,6,tA);}
        if(gl===1){dr(gx-3,gy,6,2,tA);dr(gx-3,gy+4,6,2,tA);}
        if(gl===2)dr(gx-4,gy,8,4,tA);
        if(gl===3)for(let k=0;k<3;k++)dr(gx-4+k*3,gy,2,6,tA);}
    }
    if(currentStage===2&&isG){ // 雷峰: 稲妻紋様
      for(let gx=tx+16;gx<tx+ter.w-16;gx+=56){
        dr(gx,ter.y+2,2,4,'#2a3860');dr(gx+3,ter.y+4,2,4,'#2a3860');}
    }
    if(currentStage===3){ // 炎窟: 溶岩の縁が光る
      const gl=Math.sin(t/300+ter.x*.002)*.4+.6;
      ctx.globalAlpha=gl*.18;dr(tx,ter.y,ter.w,2,'#ff4400');ctx.globalAlpha=1;
    }
    if(currentStage===4&&isG){ // 深海神殿: 海藻・緑光
      for(let gx=tx+10;gx<tx+ter.w-10;gx+=36){
        const wv=Math.sin(t/600+gx*.1)*2;
        dr(gx+wv,ter.y-8,3,10,'#0a3a20');dr(gx+wv+1,ter.y-7,1,8,'#1a6a30');}
    }
    if(currentStage===5){ // 月宮殿: 水晶・白縁
      ctx.globalAlpha=0.22;dr(tx,ter.y,ter.w,1,'#9988ff');ctx.globalAlpha=1;
      if(isG&&ter.w>80){const gx=tx+ter.w*.5-2;dr(gx,ter.y-4,4,6,'#6655aa');dr(gx+1,ter.y-3,2,4,'#cc99ff');}
    }
    if(currentStage===6&&isG){ // 大地の果て: ひび割れ
      for(let gx=tx+20;gx<tx+ter.w-20;gx+=60){
        dr(gx,ter.y+1,1,ter.h-1,'#1a0800');dr(gx+1,ter.y+2,1,ter.h-3,'#0e0600');}
    }
    if(currentStage===7){ // 虚無: エネルギー線が流れる
      const fl=Math.sin(t/200+ter.x*.003)*.5+.5;
      ctx.globalAlpha=fl*.15;dr(tx,ter.y,ter.w,1,'#4400ff');ctx.globalAlpha=1;
    }
  });
}

function drawBossOrb(){
  if(!bossOrb||bossOrb.collected)return;
  const ox=Math.floor(bossOrb.x-cam.x);
  const oy=Math.floor(bossOrb.y);
  if(ox<-50||ox>W+50)return;
  const col=ORB_COLORS[bossOrb.stage-1];
  const t=frameTime;
  const gl=Math.sin(t/280)*.5+.5;
  // 外グロウ
  ctx.globalAlpha=0.18+gl*.16;
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(ox,oy,28,0,Math.PI*2);ctx.fill();
  // 中グロウ
  ctx.globalAlpha=0.45+gl*.2;
  ctx.beginPath();ctx.arc(ox,oy,17,0,Math.PI*2);ctx.fill();
  // コア
  ctx.globalAlpha=1;
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(ox,oy,11,0,Math.PI*2);ctx.fill();
  // ハイライト
  ctx.globalAlpha=0.75;
  ctx.fillStyle='#ffffff';
  ctx.beginPath();ctx.arc(ox-3.5,oy-3.5,4.5,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // うさ耳 (ピクセル風)
  dr(ox-8,oy-26,5,14,col);
  dr(ox+3,oy-26,5,14,col);
  dr(ox-7,oy-25,2,11,'#ffffff55');
  dr(ox+4,oy-25,2,11,'#ffffff55');
  // PICK UP!点滅
  if(Math.floor(t/400)%2){
    ctx.fillStyle='#ffffff';ctx.globalAlpha=0.9;
    ctx.font='bold 8px monospace';ctx.textAlign='center';
    ctx.fillText('PICK UP!',ox,oy+26);
    ctx.globalAlpha=1;
  }
}

function drawEffect(ef){
  const ex=Math.floor(ef.x-cam.x);
  if(ef.type==='melee'){
    ctx.globalAlpha=ef.timer/15*.65;
    for(let dy=0;dy<ef.h;dy+=P*2)for(let dx=0;dx<ef.w;dx+=P*2){dr(ex+dx,ef.y+dy,P,P,ef.col);}
    ctx.globalAlpha=1;
  }
  if(ef.type==='claw'){
    ctx.globalAlpha=ef.timer/14*.8;
    for(let i=0;i<3;i++){for(let d=0;d<10;d++)dr(ex+i*10+d*P,ef.y+i*12+d*P,P,P,ef.col);}
    ctx.globalAlpha=1;
  }
  if(ef.type==='sword'){
    ctx.globalAlpha=ef.timer/12*.9;
    for(let i=0;i<5;i++){
      dr(ex+i*8,ef.y+i*8,ef.w-i*11,3,'#c0d0ff');
      dr(ex+i*6,ef.y+i*6,ef.w-i*8, 1,'#eef4ff');
    }
    dr(ex,ef.y,7,ef.h,'#ffffff');
    ctx.globalAlpha=1;
  }
  if(ef.type==='poison'){
    ctx.globalAlpha=ef.timer/80*.5;
    for(let dy=0;dy<ef.h;dy+=P*2)for(let dx=0;dx<ef.w;dx+=P*2){
      if((dx+dy)%12<6)dr(ex+dx,ef.y+dy,P*2,P*2,'#44ee44');
    }
    ctx.globalAlpha=1;
  }
  if(ef.type==='slash'){
    const prog=ef.timer/ef.maxTimer;
    ctx.globalAlpha=prog*.28;
    ctx.fillStyle=ef.col;ctx.fillRect(ex,ef.y,ef.w,ef.h);
    ctx.globalAlpha=prog*.9;
    ctx.strokeStyle=ef.col;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(ex+3,ef.y);ctx.lineTo(ex+ef.w,ef.y+ef.h*.75);ctx.stroke();
    ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ex+3,ef.y);ctx.lineTo(ex+ef.w,ef.y+ef.h*.75);ctx.stroke();
    ctx.strokeStyle=ef.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ex,ef.y+ef.h*.25);ctx.lineTo(ex+ef.w-3,ef.y+ef.h);ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(ef.type==='explode'){
    const prog=1-ef.timer/ef.maxTimer;
    const r=Math.max(1,ef.r*prog);
    ctx.globalAlpha=(1-prog)*.9;
    ctx.strokeStyle='#ff8800';ctx.lineWidth=Math.max(1,7*(1-prog));
    ctx.beginPath();ctx.arc(ex,ef.y,r,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#ffee44';ctx.lineWidth=Math.max(1,3*(1-prog));
    ctx.beginPath();ctx.arc(ex,ef.y,r*.55,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
}

function drawCircleBtn(b,held,bg,hbg,br,hbr,tc,lb){
  const cx=b.x+b.s/2, cy=b.y+b.s/2;
  const r=(b.s/2)*(held?0.88:1); // 押下時に少し縮む
  ctx.save();
  // 外側グロー (押下時)
  if(held){
    ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.arc(cx,cy,r+7,0,Math.PI*2);
    ctx.fillStyle=hbr;ctx.fill();
    ctx.globalAlpha=0.18;
    ctx.beginPath();ctx.arc(cx,cy,r+14,0,Math.PI*2);
    ctx.fillStyle=hbr;ctx.fill();
  }
  // 本体
  ctx.globalAlpha=held?0.97:0.70;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=held?hbg:bg;ctx.fill();
  // 上半分ハイライト (立体感)
  const grd=ctx.createLinearGradient(cx,cy-r,cx,cy+r);
  grd.addColorStop(0,`rgba(255,255,255,${held?0.28:0.18})`);
  grd.addColorStop(0.45,'rgba(255,255,255,0)');
  grd.addColorStop(1,`rgba(0,0,0,${held?0.28:0.18})`);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=grd;ctx.fill();
  // リング
  ctx.globalAlpha=held?0.95:0.75;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=held?hbr:br;ctx.lineWidth=held?2.5:2;ctx.stroke();
  // ラベル
  ctx.globalAlpha=1;
  ctx.fillStyle=held?'#ffffff':tc;
  ctx.font=`bold ${Math.floor(Math.min(r*.66,15))}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lb,cx,cy+1);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}
function drawBtns(){
  const z=getBtns();
  const jetOn=player&&player.jetActive&&Math.floor(frameTime/60)%2;
  const jetBg='#081a12',jetHbg='#116644',jetBr='#224433',jetHbr='#33ffaa',jetTc='#33bb88';
  const btns=[
    {b:z.left,  lb:'◀',   held:touchHeld.left||keys['ArrowLeft']||keys['a'],
     bg:'#0f1828',hbg:'#2244aa',br:'#334466',hbr:'#55aaff',tc:'#8899cc'},
    {b:z.right, lb:'▶',   held:touchHeld.right||keys['ArrowRight']||keys['d'],
     bg:'#0f1828',hbg:'#2244aa',br:'#334466',hbr:'#55aaff',tc:'#8899cc'},
    {b:z.jump,  lb:'JUMP',held:touchHeld.jumpHeld,
     bg:'#0a1a44',hbg:'#1144dd',br:'#2255aa',hbr:'#66aaff',tc:'#6699ee'},
    {b:z.atk,   lb:'ATK', held:false,
     bg:'#2a0a08',hbg:'#bb2200',br:'#662200',hbr:'#ff6644',tc:'#cc4422'},
    {b:z.jet,   lb:'JET', held:!!jetOn,
     bg:jetBg,hbg:jetHbg,br:jetBr,hbr:jetHbr,tc:jetTc},
  ];
  btns.forEach(({b,lb,held,bg,hbg,br,hbr,tc})=>{
    drawCircleBtn(b,held,bg,hbg,br,hbr,tc,lb);
  });
  // ATKクールダウン: 円弧で残量表示
  if(player&&player.atkCd>0){
    const cd=CHARS[player.ci].atkCd,b=z.atk;
    const cx=b.x+b.s/2,cy=b.y+b.s/2,r=b.s/2;
    const ratio=player.atkCd/cd;
    ctx.globalAlpha=0.55;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);
    ctx.closePath();ctx.fillStyle='#000';ctx.fill();
    ctx.globalAlpha=1;
  }
  // JETクールダウン: 円弧 + 残秒数
  if(player&&player.jetCd>0&&!player.jetActive){
    const b=z.jet;
    const cx=b.x+b.s/2,cy=b.y+b.s/2,r=b.s/2;
    const ratio=player.jetCd/180;
    ctx.globalAlpha=0.65;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);
    ctx.closePath();ctx.fillStyle='#000';ctx.fill();
    ctx.globalAlpha=1;
    // 残り秒数テキスト
    const secs=Math.ceil(player.jetCd/60);
    ctx.save();ctx.globalAlpha=0.92;
    ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.floor(r*.52)}px monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(secs,cx,cy+1);
    ctx.restore();
  }
  // コンボドット (ATKボタン上・丸ドット)
  if(player){
    const b=z.atk;
    const cx=b.x+b.s/2,cy=b.y-10;
    ctx.globalAlpha=player.comboTimer>0?.9:.28;
    for(let k=0;k<3;k++){
      const lit=player.comboTimer>0&&k<=player.comboStep;
      ctx.beginPath();ctx.arc(cx+(k-1)*13,cy,5,0,Math.PI*2);
      ctx.fillStyle=lit?'#ffcc00':'#333';ctx.fill();
      if(lit){ctx.beginPath();ctx.arc(cx+(k-1)*13,cy,3.5,0,Math.PI*2);ctx.fillStyle='#ffee88';ctx.fill();}
    }
    ctx.globalAlpha=1;
  }
}

const CUTSCENE_LINES=[
  {txt:'……全てのオーブを集めてくれたか。ご苦労だった。',col:'#e8ddc8',speaker:'天枝　所長'},
  {txt:'気づいていなかったか？　この施設を設計したのは、私だ。',col:'#e8ddc8',speaker:'天枝　所長'},
  {txt:'お前たちが命がけで集めたオーブのエネルギー……それが目的だった。',col:'#ffcc88',speaker:'天枝　所長'},
  {txt:'人類の絶対支配のために。実験体のお前たちには関係のない話だがな。',col:'#ffaa66',speaker:'天枝　所長'},
  {txt:'さあ、オーブを渡してもらおう。全て。',col:'#ff8844',speaker:'天枝　所長'},
  {txt:'……断る、か。',col:'#ff5500',speaker:'天枝　所長'},
  {txt:'では――力ずくだ。',col:'#ff2200',speaker:'天枝　所長',last:true},
];
function advanceCutscene(){
  if(cutsceneTimer>30||cutsceneFlash>0)return; // 演出中は受け付けない
  cutsceneStep++;
  if(cutsceneStep>=CUTSCENE_LINES.length){
    // 変身エフェクト → ボス戦へ (1回だけ)
    cutsceneFlash=40;
    setTimeout(()=>{
      if(state==='cutscene'){spawnBoss();bgmPlay('boss');addShake(8);state='play';}
    },700);
  } else {
    cutsceneTimer=60;
  }
}
function drawCutscene(){
  dr(0,0,W,H,'#020108');
  STARS.forEach(s=>{const sx=(s.x%W+W)%W;if(!(s.b&&Math.floor(frameTime/500)%2))dr(sx,s.y,s.s,s.s,'#fff');});
  if(cutsceneTimer>0)cutsceneTimer--;

  const step=Math.min(cutsceneStep,CUTSCENE_LINES.length-1);
  const line=CUTSCENE_LINES[step];

  // 変身フラッシュ
  if(cutsceneFlash>0){
    cutsceneFlash--;
    ctx.globalAlpha=cutsceneFlash/40;
    dr(0,0,W,H,'#ffffff');
    ctx.globalAlpha=1;
    // 渦巻きパーティクル
    if(cutsceneFlash%3===0){
      const a=Math.random()*Math.PI*2;
      const r=Math.random()*80+20;
      particles.push({x:W/2+Math.cos(a)*r,y:H*.38+Math.sin(a)*r*.5,vx:Math.cos(a)*-4,vy:Math.sin(a)*-4,col:['#cc44ff','#ff00cc','#ffffff','#8800ff'][Math.floor(Math.random()*4)],life:35});
    }
    return;
  }

  // === 所長キャラ描画 (白衣の人間) ===
  const cx=W/2-10, cy=H*.18;
  // 影
  ctx.globalAlpha=0.18;dr(cx-22,cy+90,60,10,'#000');ctx.globalAlpha=1;
  // 脚 (黒ズボン)
  dr(cx+4,cy+68,10,22,'#1a1a2a');dr(cx+18,cy+68,10,22,'#1a1a2a');
  // 白衣の裾
  dr(cx-2,cy+58,36,16,'#d8dde8');
  // 体 (白衣)
  dr(cx,cy+28,32,34,'#d8dde8');
  // 白衣の縦ライン
  dr(cx+14,cy+28,4,34,'#b8bec8');
  // 白衣の衿
  dr(cx+8,cy+28,6,10,'#c8cdd8');dr(cx+18,cy+28,6,10,'#c8cdd8');
  // 胸ポケット + ペン
  dr(cx+4,cy+36,8,6,'#b8bcc8');dr(cx+5,cy+34,2,5,'#334488');
  // 腕 (白衣)
  dr(cx-6,cy+30,8,24,'#d0d5e0');dr(cx+30,cy+30,8,24,'#d0d5e0');
  // 手
  dr(cx-6,cy+54,8,8,'#d4a882');dr(cx+30,cy+54,8,8,'#d4a882');
  // 首
  dr(cx+12,cy+20,8,10,'#d4a882');
  // 頭
  dr(cx+4,cy,24,22,'#d4a882');
  // 白髪 (上)
  dr(cx+4,cy-2,24,6,'#e8e8e8');
  dr(cx+2,cy+2,4,10,'#e8e8e8');dr(cx+26,cy+2,4,10,'#e8e8e8');
  // 眼鏡フレーム
  dr(cx+6,cy+8,8,6,'#334455');dr(cx+18,cy+8,8,6,'#334455');
  dr(cx+14,cy+10,4,2,'#334455');
  // レンズ (光)
  ctx.globalAlpha=0.55;dr(cx+7,cy+9,6,4,'#aaddff');dr(cx+19,cy+9,6,4,'#aaddff');ctx.globalAlpha=1;
  // 口 (薄い線)
  dr(cx+10,cy+16,12,2,'#b08868');

  // ネームプレート
  const nfs=Math.min(W*.022,13);
  ctx.textAlign='center';
  ctx.fillStyle='#223344';ctx.font=`bold ${nfs}px monospace`;
  ctx.fillText('────────────────',W/2,H*.36);
  ctx.fillStyle='#88aabb';ctx.font=`${nfs}px monospace`;
  ctx.fillText(line.speaker,W/2,H*.36+16);

  // セリフボックス
  const bx=W*.04, by=H*.60, bw=W*.92, bh=H*.30;
  dr(bx,by,bw,bh,'#070314');
  ctx.strokeStyle='#442266';ctx.lineWidth=1.5;
  ctx.strokeRect(bx,by,bw,bh);ctx.lineWidth=1;
  // コーナー装飾
  dr(bx,by,6,6,'#8822cc');dr(bx+bw-6,by,6,6,'#8822cc');
  dr(bx,by+bh-6,6,6,'#8822cc');dr(bx+bw-6,by+bh-6,6,6,'#8822cc');

  // テキスト (折り返し)
  const tfs=Math.min(W*.036,14);
  ctx.font=`${tfs}px monospace`;
  ctx.textAlign='left';
  const words=line.txt;
  const maxW=bw-24;
  let textLines=[];
  let cur='';
  for(const ch of words){
    const test=cur+ch;
    if(ctx.measureText(test).width>maxW){textLines.push(cur);cur=ch;}
    else cur=test;
  }
  if(cur)textLines.push(cur);
  textLines.forEach((tl,ti)=>{
    ctx.fillStyle='#110022';ctx.fillText(tl,bx+13+1,by+26+ti*20+1);
    ctx.fillStyle=line.col;ctx.fillText(tl,bx+13,by+26+ti*20);
  });

  // タップ促進 (点滅)
  if(cutsceneTimer<=0&&cutsceneStep<CUTSCENE_LINES.length){
    if(Math.floor(frameTime/400)%2){
      ctx.fillStyle='#8866aa';ctx.font=`${Math.min(W*.022,12)}px monospace`;
      ctx.textAlign='center';ctx.fillText('▼ TAP TO CONTINUE',W/2,by+bh-10);
    }
  }
  // 最後のセリフは演出感UP
  if(line.last&&cutsceneTimer<=0){
    ctx.globalAlpha=0.12+Math.sin(frameTime/200)*.08;
    dr(0,0,W,H,'#440022');ctx.globalAlpha=1;
  }
  scanlines();
}

function csLayout(){
  const bw=62,bh=114,gap=4;
  const mainCount=6;
  const total=mainCount*(bw+gap)-gap,sx=(W-total)/2,by=H*.35;
  return{
    chars:CHARS.slice(0,mainCount).map((_,i)=>({x:sx+i*(bw+gap),y:by,w:bw,h:bh})),
    start:{x:W/2-78,y:H*.78,w:156,h:42},
    secret:{x:W/2-52,y:H*.905,w:104,h:32}
  };
}

function drawArenaWalls(){
  if(!bossTriggered||bossDefeated)return;
  const t=frameTime;
  const gl=Math.sin(t/220)*.5+.5;
  const drawWall=(wx)=>{
    const sx=Math.floor(wx-cam.x);
    if(sx>W+30||sx+22<-30)return;
    // 石積み
    dr(sx,0,22,H,'#180d22');
    for(let wy=0;wy<H;wy+=36){
      dr(sx+1,wy+1,20,33,'#221035');
      dr(sx+1,wy+1,20,2,'#301848');
      dr(sx+2,wy+28,18,2,'#110820');
    }
    // エネルギーライン (右端 or 左端)
    ctx.globalAlpha=0.45+gl*.25;
    dr(sx+18,0,4,H,'#cc44ff');
    ctx.globalAlpha=0.18+gl*.12;
    dr(sx+14,0,8,H,'#ff88ff');
    ctx.globalAlpha=1;
    // ルーン文字
    const rc=`rgba(180,80,255,${0.5+gl*.3})`;
    ctx.fillStyle=rc;ctx.font='bold 9px monospace';ctx.textAlign='center';
    for(let ry=40;ry<H-40;ry+=80){
      ctx.fillText(['⚡','☽','✦','⚔'][Math.floor(ry/80)%4],sx+11,ry);
    }
  };
  drawWall(BOSS_ARENA_LEFT-22);
  drawWall(BOSS_ARENA_RIGHT);
}

function drawHazards(){
  const now=frameTime;
  // 天井レーザー
  HAZARD_LASERS.forEach(l=>{
    const sx=Math.floor(l.x-cam.x);
    if(sx<-30||sx>W+30)return;
    const cy=l.ceilY;
    if(l.warn){
      const pulse=Math.sin(now/80)*.4+.6;
      ctx.globalAlpha=pulse*.35;ctx.fillStyle='#ffdd44';ctx.fillRect(sx,cy,10,H-cy);
      ctx.globalAlpha=pulse*.15;ctx.fillStyle='#ffee88';ctx.fillRect(sx-5,cy,20,H-cy);
      ctx.globalAlpha=1;
      // エミッター (天井接合部)
      ctx.globalAlpha=pulse*.8;dr(sx-4,cy-6,18,8,'#cc8800');dr(sx-1,cy-2,12,4,'#ffdd44');
      ctx.globalAlpha=1;
    }else if(l.active){
      ctx.globalAlpha=0.92;ctx.fillStyle='#ff2200';ctx.fillRect(sx,cy,10,H-cy);
      ctx.globalAlpha=0.3;ctx.fillStyle='#ffaa00';ctx.fillRect(sx-6,cy,22,H-cy);
      ctx.globalAlpha=0.8;ctx.fillStyle='#ffffff';ctx.fillRect(sx+3,cy,4,H-cy);
      ctx.globalAlpha=1;
      dr(sx-4,cy-6,18,8,'#ff4400');
    }
  });
  // 床スパイク
  HAZARD_SPIKES.forEach(sp=>{
    if(sp.ext<=0)return;
    const sx=Math.floor(sp.x-cam.x);
    if(sx<-40||sx>W+40)return;
    const sy=Math.floor(sp.y);
    for(let i=-1;i<=1;i++){
      const bx=sx+i*10;
      dr(bx,sy-sp.ext,4,sp.ext,'#882200');
      dr(bx+1,sy-sp.ext,2,2,'#ff6644');
      if(sp.ext>10)dr(bx+1,sy-sp.ext+2,1,sp.ext*.4|0,'#cc4400');
    }
    if(sp.active){ctx.globalAlpha=0.22;dr(sx-9,sy-sp.ext-2,26,sp.ext+4,'#ff4400');ctx.globalAlpha=1;}
  });
}

function drawZeroGZones(){
  const t=frameTime;
  ZERO_G_ZONES.forEach(z=>{
    const x1=Math.floor(z.x1-cam.x),x2=Math.floor(z.x2-cam.x);
    if(x2<-60||x1>W+60)return;
    const w=x2-x1,h=z.y2-z.y1;
    ctx.globalAlpha=0.06+Math.sin(t/500)*0.025;
    ctx.fillStyle='#8899ff';ctx.fillRect(x1,z.y1,w,h);
    ctx.globalAlpha=0.28+Math.sin(t/320)*0.08;
    ctx.fillStyle='#aabbff';ctx.fillRect(x1,z.y1,w,2);
    ctx.fillStyle='#aabbff';ctx.fillRect(x1,z.y2-2,w,2);
    ctx.globalAlpha=1;
    ctx.globalAlpha=0.4+Math.sin(t/600)*0.12;
    ctx.fillStyle='#88aaff';ctx.font='bold 9px monospace';ctx.textAlign='center';
    const tx=Math.min(Math.max(x1+w/2,50),W-50);
    ctx.fillText('ZERO-G',tx,z.y1+18);
    ctx.globalAlpha=1;
    for(let px=Math.max(x1,0);px<Math.min(x2,W);px+=36){
      const py=z.y1+((px*5+Math.floor(t/90)*4)%h);
      ctx.globalAlpha=0.15;ctx.fillStyle='#ffffff';ctx.fillRect(px,py,2,2);ctx.globalAlpha=1;
    }

}
function drawPlay(){
  drawBg();
  drawZeroGZones();
  drawTerrain();
  drawHazards();
  drawGoal();
  drawArenaWalls();
  drawPitSpikes();
  drawStageItems();
  drawBossOrb();
  // 壁スライドスパーク
  if(player&&player.onWall&&player.wallSlide&&!player.onGround&&Math.random()<.4)
    burst(player.x-cam.x+(player.wallDir>0?player.w:0),player.y+player.h*.6,'#aabbff',1);
  // Lv2 オーラ
  if(player&&player.weaponLv===2){
    const ax=Math.floor(player.x-cam.x+player.w/2),ay=Math.floor(player.y+player.h/2),tt=frameTime;
    ctx.globalAlpha=0.14+Math.sin(tt/130)*.07;ctx.fillStyle='#ff8800';
    ctx.beginPath();ctx.arc(ax,ay,28,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.1+Math.sin(tt/90)*.06;ctx.fillStyle='#ffdd44';
    ctx.beginPath();ctx.arc(ax,ay,18,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // LVアップグロー
  if(player&&lvupFlash>0){
    const ax=Math.floor(player.x-cam.x+player.w/2),ay=Math.floor(player.y+player.h/2);
    const fa=(lvupFlash/180)*Math.abs(Math.sin(frameTime/55));
    ctx.globalAlpha=fa*0.55;ctx.fillStyle='#ffee00';
    ctx.beginPath();ctx.arc(ax,ay,44,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=fa*0.35;ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(ax,ay,28,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  effects.forEach(drawEffect);
  projectiles.forEach(p=>{
    const bx=Math.floor(p.x-cam.x),by=Math.floor(p.y);
    if(p.wlv>=1){
      const now=frameTime,cr=Math.max(p.w,p.h)/2;
      ctx.globalAlpha=0.16+Math.sin(now/90)*.06;
      ctx.fillStyle=p.wlv===2?'#ff8800':'#ffdd44';
      ctx.beginPath();ctx.arc(bx+p.w/2,by+p.h/2,cr+8,0,Math.PI*2);ctx.fill();
      if(p.wlv===2){
        ctx.globalAlpha=0.22+Math.sin(now/130)*.08;
        ctx.fillStyle='#ff5500';
        ctx.beginPath();ctx.arc(bx+p.w/2,by+p.h/2,cr+16,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    if(p.claw){
      // 狼: 3本の爪傷が飛ぶ
      const dir=p.vx>=0?1:-1;
      ctx.save();ctx.translate(bx+p.w/2,by+p.h/2);
      if(dir<0)ctx.scale(-1,1);
      const clawCols=['#aabbff','#ccddff','#ffffff'];
      for(let i=0;i<3;i++){
        const ox=(i-1)*5, slant=p.h*0.55;
        ctx.globalAlpha=i===1?0.95:0.7;
        ctx.strokeStyle=clawCols[i];ctx.lineWidth=i===1?2.5:1.8;
        ctx.beginPath();
        ctx.moveTo(p.w*0.45+ox, -p.h*0.5);
        ctx.lineTo(-p.w*0.35+ox,  p.h*0.5);
        ctx.stroke();
      }
      // グロウ
      ctx.globalAlpha=0.18;ctx.fillStyle='#8899ff';
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.globalAlpha=1;ctx.restore();
    }else if(p.slash){
      // 蟷螂: 鎌形(三日月)スラッシュ
      const dir=p.vx>=0?1:-1;
      const R=Math.max(p.w,p.h)*0.72;
      ctx.save();
      ctx.translate(bx+p.w/2,by+p.h/2);
      if(dir<0)ctx.scale(-1,1);
      // 外側グロウ
      ctx.globalAlpha=0.18;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(0,0,R+5,-Math.PI*.7,Math.PI*.7);ctx.arc(-R*.18,0,R*.52+5,Math.PI*.7,-Math.PI*.7,true);ctx.closePath();ctx.fill();
      // 鎌本体
      ctx.globalAlpha=0.92;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(0,0,R,-Math.PI*.7,Math.PI*.7);ctx.arc(-R*.18,0,R*.52,Math.PI*.7,-Math.PI*.7,true);ctx.closePath();ctx.fill();
      // 刃の光沢ライン
      ctx.globalAlpha=0.85;ctx.strokeStyle='#ccffee';ctx.lineWidth=1.8;
      ctx.beginPath();ctx.arc(0,0,R,-Math.PI*.68,Math.PI*.68);ctx.stroke();
      ctx.globalAlpha=0.4;ctx.strokeStyle='#ffffff';ctx.lineWidth=0.9;
      ctx.beginPath();ctx.arc(0,0,R-3,-Math.PI*.5,Math.PI*.5);ctx.stroke();
      ctx.globalAlpha=1;ctx.restore();
    }else if(p.arrow){
      // 鷹: 矢(矢羽根+矢軸+矢尻)
      const dir=p.vx>=0?1:-1;
      const tipX=dir>0?bx+p.w:bx;
      const tailX=dir>0?bx:bx+p.w;
      const cy2=by+Math.floor(p.h/2);
      // 矢羽根 (tail)
      const fw=dir>0?1:-1;
      dr(tailX,cy2-3,3,3,'#884400');dr(tailX,cy2+1,3,3,'#884400');
      dr(tailX-fw,cy2-4,2,2,'#bb6600');dr(tailX-fw,cy2+3,2,2,'#bb6600');
      // 矢軸
      dr(dir>0?bx+3:bx,cy2-1,p.w-6,3,'#7a4a12');
      dr(dir>0?bx+3:bx,cy2,p.w-6,1,'#c8803a');
      // 矢尻 (三角形状)
      ctx.fillStyle='#ffdd44';
      ctx.beginPath();
      ctx.moveTo(tipX,cy2);
      ctx.lineTo(tipX-dir*7,cy2-4);
      ctx.lineTo(tipX-dir*7,cy2+4);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#cc9922';
      ctx.beginPath();
      ctx.moveTo(tipX,cy2);
      ctx.lineTo(tipX-dir*7,cy2+4);
      ctx.lineTo(tipX-dir*5,cy2);
      ctx.closePath();ctx.fill();
    }else if(p.bomb){
      const s=p.w;
      // 弾道に合わせて回転
      ctx.save();ctx.translate(bx+s/2,by+s/2);
      const ballAngle=Math.atan2(p.vy,p.vx)+Math.PI/2;
      ctx.rotate(ballAngle);
      const r2=s/2;
      // 本体（丸い爆弾）
      ctx.beginPath();ctx.arc(0,0,r2,0,Math.PI*2);ctx.fillStyle='#3a3a1e';ctx.fill();
      ctx.beginPath();ctx.arc(0,0,r2-1,0,Math.PI*2);ctx.fillStyle='#555530';ctx.fill();
      ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(-r2*.3,-r2*.35,r2*.35,0,Math.PI*2);ctx.fillStyle='#888855';ctx.fill();ctx.globalAlpha=1;
      // 導火線（上方向）
      ctx.fillStyle='#774422';ctx.fillRect(-1,-r2-5,2,5);
      if(Math.floor(frameTime/80)%2){ctx.fillStyle='#ffcc00';ctx.fillRect(-2,-r2-9,3,3);}
      else{ctx.fillStyle='#ff8800';ctx.fillRect(-1,-r2-8,2,2);}
      ctx.restore();
    }else if(p.needle){
      const dir=p.vx>=0?1:-1;
      dr(bx,by,p.w,p.h,'#0d6600');
      dr(bx,by,p.w,1,'#55ff22');
      ctx.globalAlpha=0.28;dr(bx-1,by-1,p.w+2,p.h+2,'#33ff00');ctx.globalAlpha=1;
      // Metallic tip
      const tx=dir>0?bx+p.w-2:bx;
      dr(tx,by,2,p.h,'#aaffaa');
      dr(dir>0?bx+p.w-1:bx,by+1,1,Math.max(1,p.h-2),'#ffffff');
    }else if(p.whip){
      // 電磁ムチ: 放電アーク
      const dir=p.vx>=0?1:-1;
      const cx2=bx+p.w/2, cy2=by+p.h/2;
      ctx.save();ctx.translate(cx2,cy2);if(dir<0)ctx.scale(-1,1);
      ctx.globalAlpha=0.85;
      ctx.strokeStyle='#ffcc00';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(-p.w/2,0);
      for(let k=1;k<=8;k++){
        const t=k/8;const wx2=-p.w/2+t*p.w;
        const wy2=Math.sin(t*Math.PI)*p.h*.45*(k%2===0?1:-1);
        ctx.lineTo(wx2,wy2);
      }
      ctx.stroke();
      ctx.globalAlpha=0.35;ctx.strokeStyle='#ffffff';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(-p.w/2,0);ctx.lineTo(p.w/2,0);ctx.stroke();
      ctx.globalAlpha=0.18;ctx.fillStyle='#ffee88';
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.globalAlpha=1;ctx.restore();
    }else if(p.slash_tsuku){
      // 月兎ツクヨミ: 三日月閃光スラッシュ
      const dir=p.vx>=0?1:-1;
      const la=(p.life/7)*0.88;
      ctx.save();
      ctx.globalAlpha=la*0.28;ctx.fillStyle='#c0ddff';
      ctx.fillRect(bx-3,by-4,p.w+6,p.h+8);
      ctx.globalAlpha=la*0.7;ctx.fillStyle='#88ccff';
      ctx.fillRect(bx,by,p.w,p.h);
      ctx.globalAlpha=la*0.9;ctx.fillStyle='#e8f4ff';
      ctx.fillRect(bx+2,by+Math.floor(p.h*.3),p.w-4,Math.ceil(p.h*.4));
      // 三日月エッジ光
      ctx.globalAlpha=la*0.85;ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+p.w,by+p.h);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx,by+p.h);ctx.lineTo(bx+p.w,by);ctx.stroke();
      ctx.globalAlpha=1;ctx.restore();
    }else if(p.punch){
      // 拳衝撃フラッシュ
      const alpha=(p.life/8)*0.75;
      ctx.globalAlpha=alpha;dr(bx,by,p.w,p.h,'#aabbcc');
      ctx.globalAlpha=alpha*0.4;dr(bx-2,by-2,p.w+4,p.h+4,'#ffffff');
      ctx.globalAlpha=1;
    }else if(p.laser){
      // ブレスビーム (グロー効果)
      const la=Math.min(1,p.life/14)*0.95;
      ctx.globalAlpha=la*0.25;dr(bx-2,by-6,p.w+4,p.h+12,'#ffcc00');
      ctx.globalAlpha=la*0.55;dr(bx-1,by-3,p.w+2,p.h+6,p.col);
      ctx.globalAlpha=la*0.85;dr(bx,by-1,p.w,p.h+2,'#ffaa33');
      ctx.globalAlpha=la;dr(bx+2,by+Math.floor(p.h*.3),p.w-4,Math.ceil(p.h*.4),'#ffffff');
      ctx.globalAlpha=1;
    }else if(p.missile){
      // ミサイル
      ctx.globalAlpha=0.5;dr(bx-1,by-1,p.w+2,p.h+2,p.col);ctx.globalAlpha=1;
      dr(bx,by,p.w,p.h,p.col);dr(bx+2,by+2,p.w-4,p.h-4,'#ffee88');
    }else if(p.stomp){
      // 踏みつけ衝撃波: 横楕円
      const alpha=(p.life/16)*0.8;
      ctx.globalAlpha=alpha;
      ctx.fillStyle='#667788';
      ctx.beginPath();ctx.ellipse(bx+p.w/2,by+p.h/2,p.w/2,p.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=alpha*0.55;ctx.fillStyle='#99bbcc';
      ctx.beginPath();ctx.ellipse(bx+p.w/2,by+p.h/2,p.w/2-3,p.h/2-3,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }else if(p.pierce&&p.w>=30){
      ctx.globalAlpha=0.35;dr(bx-2,by-3,p.w+4,p.h+6,p.col);ctx.globalAlpha=1;
      dr(bx,by,p.w,p.h,p.col);dr(bx,by+Math.floor(p.h*.35),p.w,Math.floor(p.h*.3),'#ffffff');
    }else if(p.homing){
      ctx.globalAlpha=0.4;dr(bx-2,by-2,p.w+4,p.h+4,p.col);ctx.globalAlpha=1;
      dr(bx,by,p.w,p.h,p.col);dr(bx+3,by+3,p.w-6,p.h-6,'#ccffaa');
    }else{
      dr(bx,by,p.w,p.h,p.col);if(p.w>4&&p.h>4)dr(bx+1,by+1,p.w-2,p.h-2,'#ffffff');
    }
  });
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/22);dr(Math.floor(p.x-cam.x),Math.floor(p.y),P,P,p.col);});ctx.globalAlpha=1;
  drawEnemies();
  if(boss&&boss.hp>0)drawBoss();
  if(player){
    // ジェットシールド (jetActive中は常に表示・点滅なし)
    if(player.jetActive){
      const scx=Math.floor(player.x-cam.x)+player.w/2;
      const scy=Math.floor(player.y)+player.h/2;
      const pulse=Math.sin(frameTime*.022);
      const sr=player.w*1.1+pulse*4;
      const sc='#5599ff';
      ctx.save();
      // 外リング光
      ctx.globalAlpha=0.18+pulse*.06;
      ctx.beginPath();ctx.arc(scx,scy,sr+8,0,Math.PI*2);
      const grd=ctx.createRadialGradient(scx,scy,sr*.2,scx,scy,sr+8);
      grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(0.65,sc+'33');grd.addColorStop(1,sc+'aa');
      ctx.fillStyle=grd;ctx.fill();
      // 縁ライン
      ctx.globalAlpha=0.55+pulse*.20;
      ctx.beginPath();ctx.arc(scx,scy,sr,0,Math.PI*2);
      ctx.strokeStyle=sc;ctx.lineWidth=2.5;ctx.stroke();
      // 六角形ハニカム模様 (シールド感)
      ctx.globalAlpha=0.22+pulse*.08;
      ctx.strokeStyle=sc;ctx.lineWidth=1;
      for(let a=0;a<6;a++){
        const ang=a*Math.PI/3+frameTime*.0004;
        const x1=scx+Math.cos(ang)*(sr*.6),y1=scy+Math.sin(ang)*(sr*.6);
        const x2=scx+Math.cos(ang+Math.PI/3)*(sr*.6),y2=scy+Math.sin(ang+Math.PI/3)*(sr*.6);
        ctx.beginPath();ctx.moveTo(scx,scy);ctx.lineTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      }
      ctx.restore();
    }
    if(player.ci===2&&player.counterWindow>0){
      const ca=player.counterWindow/26;
      ctx.globalAlpha=ca*0.5;
      dr(Math.floor(player.x-cam.x)-4,Math.floor(player.y)-4,player.w+8,player.h+8,'#00ff88');
      ctx.globalAlpha=1;
    }
    // TSUKUYOMI 残像 + 幻影分身 描画
    if(player.ci===6){
      if(player.ghostTrail){
        player.ghostTrail.forEach(g=>{
          ctx.globalAlpha=g.life/18*0.32;
          drawCharacter(Math.floor(g.x-cam.x),Math.floor(g.y),6,g.facing,0,false,0,false,false);
          ctx.globalAlpha=1;
        });
      }
      if(player.phantoms){
        player.phantoms.forEach(ph=>{
          const fa=Math.min(ph.life/90*0.42,0.38);
          ctx.globalAlpha=fa*0.5;
          ctx.fillStyle='#88ccff';
          ctx.beginPath();ctx.arc(Math.floor(ph.x-cam.x+15),Math.floor(ph.y+22),20,0,Math.PI*2);ctx.fill();
          ctx.globalAlpha=fa;
          drawCharacter(Math.floor(ph.x-cam.x),Math.floor(ph.y),6,ph.facing,0,false,0,false,false);
          ctx.globalAlpha=1;
        });
      }
    }
    if(!(player.invincible>0&&!player.jetActive&&Math.floor(player.invincible/4)%2===0)){
      const atkAnim=player.atkCd>0?player.comboStep+1:0;
      if(player.ci===6)ctx.globalAlpha=0.82;
      drawCharacter(Math.floor(player.x-cam.x),Math.floor(player.y),player.ci,player.facing,player.frame,player.moving,atkAnim,player.jetActive,!player.onGround);
      ctx.globalAlpha=1;
    }
  }
  // damageNums 描画
  damageNums.forEach(d=>{
    ctx.globalAlpha=d.life/44;
    if(d.weak){
      ctx.fillStyle='#ffee00';ctx.font=`bold ${14+d.val*2}px monospace`;ctx.textAlign='center';
      ctx.fillText('★'+d.val,Math.floor(d.x-cam.x),Math.floor(d.y));
    } else {
      ctx.fillStyle=d.val>=3?'#ffee00':d.val>=2?'#ffaa44':'#ff8888';
      ctx.font=`bold ${11+d.val*2}px monospace`;ctx.textAlign='center';
      ctx.fillText(d.val,Math.floor(d.x-cam.x),Math.floor(d.y));
    }
    ctx.globalAlpha=1;
  });
  // comboTexts 描画
  comboTexts.forEach(c=>{
    ctx.globalAlpha=c.life/45;
    ctx.fillStyle='#ffee00';ctx.strokeStyle='#884400';ctx.lineWidth=3;
    ctx.font=`bold ${Math.min(W*.038,20)}px monospace`;ctx.textAlign='center';
    ctx.strokeText('FINISH!!',Math.floor(c.x-cam.x),Math.floor(c.y));
    ctx.fillText('FINISH!!',Math.floor(c.x-cam.x),Math.floor(c.y));
    ctx.globalAlpha=1;
  });
  drawBtns();
  drawHUD();
  // ボス登場バナー
  if(bossBannerTimer>0){
    const cfg=STAGE_CFG[currentStage-1];
    const bt=bossBannerTimer;
    const alpha=bt>140?1:bt<40?bt/40:1;
    ctx.save();
    // 暗幕
    ctx.globalAlpha=alpha*0.72;dr(0,H*.28,W,H*.36,'#000010');
    // 赤ライン上下
    ctx.globalAlpha=alpha;
    dr(0,H*.28,W,2,'#cc0033');dr(0,H*.64,W,2,'#cc0033');
    // 走査線エフェクト
    const sc2=Math.floor(frameTime/18)%4;
    ctx.globalAlpha=alpha*0.10;
    for(let sy=H*.28+sc2;sy<H*.64;sy+=4)dr(0,sy,W,2,'#ffffff');
    ctx.globalAlpha=alpha;
    ctx.textAlign='center';
    // BOSS INCOMING ラベル
    ctx.fillStyle='#cc0033';ctx.font=`bold ${Math.min(W*.022,11)}px monospace`;
    ctx.fillText('─────  BOSS APPROACHING  ─────',W/2,H*.33);
    // ボス名 (大)
    const pulse=Math.sin(frameTime/90)*.06+.94;
    ctx.globalAlpha=alpha*pulse;
    ctx.fillStyle='#ff3355';ctx.font=`bold ${Math.min(W*.1,42)}px monospace`;
    ctx.fillText(cfg.bossName,W/2,H*.47);
    // ステージ名
    ctx.globalAlpha=alpha*0.8;
    ctx.fillStyle='#ff8899';ctx.font=`${Math.min(W*.028,13)}px monospace`;
    ctx.fillText(cfg.name+'  —  '+cfg.sub,W/2,H*.56);
    // フェーズ通知
    ctx.globalAlpha=alpha*0.6;
    ctx.fillStyle='#884455';ctx.font=`${Math.min(W*.02,10)}px monospace`;
    ctx.fillText(`STAGE ${currentStage} / ${TOTAL_STAGES}  BOSS BATTLE`,W/2,H*.62);
    ctx.globalAlpha=1;ctx.restore();
  }
  // ステージブリーフィングオーバーレイ
  if(stageBriefTimer>0){
    const alpha=stageBriefTimer>160?1:stageBriefTimer/160;
    ctx.save();
    ctx.globalAlpha=alpha*0.80;
    ctx.fillStyle='#000020';ctx.fillRect(0,H*.25,W,H*.42);
    ctx.globalAlpha=1;
    const scfg=STAGE_CFG[currentStage-1];
    ctx.globalAlpha=alpha;
    ctx.textAlign='center';
    ctx.fillStyle='#556699';ctx.font=`${Math.min(W*.025,11)}px monospace`;
    ctx.fillText(`STAGE ${currentStage}  ─  MISSION BRIEFING`,W/2,H*.30);
    ctx.fillStyle='#aaccff';ctx.font=`bold ${Math.min(W*.042,18)}px monospace`;
    ctx.fillText(scfg.name,W/2,H*.36);
    const brief=STAGE_BRIEF[currentStage-1]||'';
    ctx.fillStyle='#8899bb';ctx.font=`${Math.min(W*.03,13)}px monospace`;
    brief.split('\n').forEach((line,i)=>ctx.fillText(line,W/2,H*.44+i*20));
    ctx.fillStyle='#334466';ctx.font=`${Math.min(W*.022,10)}px monospace`;
    ctx.fillText('[ TAP TO DISMISS ]',W/2,H*.62);
    ctx.globalAlpha=1;
    ctx.restore();
  }
  // ポーズオーバーレイ
  if(paused){
    ctx.fillStyle='rgba(0,0,24,0.84)';ctx.fillRect(0,0,W,H);
    // タイトル
    ctx.textAlign='center';
    const pt=frameTime;
    ctx.globalAlpha=0.7+Math.sin(pt/400)*.15;
    ctx.fillStyle='#cc44ff';ctx.font=`bold ${Math.min(W*.07,44)}px monospace`;
    ctx.fillText('PAUSE',W/2,H*.24);
    ctx.globalAlpha=1;
    // 区切り線
    ctx.globalAlpha=0.4;dr(W*.12,H*.28,W*.76,1,'#8844cc');ctx.globalAlpha=1;
    const pm=getPauseMenuBtns();
    const drawPBtn=(b,top,tc,label,sub)=>{
      ctx.globalAlpha=0.88;dr(b.x,b.y,b.w,b.h,'#0c0e1e');ctx.globalAlpha=1;
      dr(b.x,b.y,b.w,3,top);
      ctx.strokeStyle=top;ctx.lineWidth=1;ctx.globalAlpha=0.5;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.globalAlpha=1;
      ctx.fillStyle=tc;ctx.font=`bold ${Math.min(W*.042,22)}px monospace`;ctx.textAlign='center';
      ctx.fillText(label,W/2,b.y+b.h*.58);
      if(sub){ctx.fillStyle='#445566';ctx.font=`${Math.min(W*.02,11)}px monospace`;ctx.fillText(sub,W/2,b.y+b.h*.88);}
    };
    drawPBtn(pm.resume,  '#5566ff','#aabbff','▶  ゲーム再開',null);
    drawPBtn(pm.savequit,'#cc8844','#ddaa66','💾  セーブして終了','現在地・HPを保存');
    drawPBtn(pm.title,   '#446688','#7799aa','⏎  タイトルへ戻る','セーブせずに戻る');
    ctx.fillStyle='#334455';ctx.font=`${Math.min(W*.018,11)}px monospace`;
    ctx.fillText('P / ESC でつづける',W/2,H*.92);
  }
  scanlines();
}

// ================================================================
//  ゲームオーバー
// ================================================================
function drawGameOver(){
  dr(0,0,W,H,'#000');
  STARS.forEach(s=>dr((s.x%W+W)%W,s.y,s.s,s.s,'#fff'));
  dr(0,0,W,H,'rgba(40,0,0,.75)');
  ctx.textAlign='center';
  ctx.fillStyle='#330000';ctx.font=`bold ${Math.min(W*.06,44)}px monospace`;ctx.fillText('MISSION FAILED',W/2+2,H*.3+2);
  ctx.fillStyle='#ff3333';ctx.fillText('MISSION FAILED',W/2,H*.3);
  ctx.fillStyle='#ffdd44';ctx.font=`bold ${Math.min(W*.03,22)}px monospace`;
  ctx.fillText('SCORE '+String(score).padStart(6,'0'),W/2,H*.44);
  const scores=getScores();
  if(scores.length){
    ctx.fillStyle='#334455';ctx.font=`bold ${Math.min(W*.015,10)}px monospace`;
    ctx.fillText('── BEST SCORES ──',W/2,H*.54);
    scores.slice(0,3).forEach((s,i)=>{
      ctx.fillStyle=i===0?'#ffcc00':'#7788aa';
      ctx.font=`${Math.min(W*.014,10)}px monospace`;
      ctx.fillText(`${i+1}. ${s.char}  ${String(s.score).padStart(7,'0')}`,W/2,H*.59+i*14);
    });
  }
  // ボタン
  const gb=getGameOverBtns();
  ctx.globalAlpha=0.9;dr(gb.retry.x,gb.retry.y,gb.retry.w,gb.retry.h,'#0d1a3a');ctx.globalAlpha=1;
  dr(gb.retry.x,gb.retry.y,gb.retry.w,3,'#4466ff');
  ctx.fillStyle='#88aaff';ctx.font=`bold ${Math.min(W*.042,22)}px monospace`;
  ctx.fillText('▶  リトライ',W/2,gb.retry.y+gb.retry.h*.65);
  ctx.fillStyle='#334466';ctx.font=`${Math.min(W*.02,11)}px monospace`;
  ctx.fillText(`ST.${currentStage}から再開`,W/2,gb.retry.y+gb.retry.h*.92);
  ctx.globalAlpha=0.9;dr(gb.charsel.x,gb.charsel.y,gb.charsel.w,gb.charsel.h,'#0a0a14');ctx.globalAlpha=1;
  dr(gb.charsel.x,gb.charsel.y,gb.charsel.w,2,'#445566');
  ctx.fillStyle='#667788';ctx.font=`bold ${Math.min(W*.038,20)}px monospace`;
  ctx.fillText('キャラ選択へ',W/2,gb.charsel.y+gb.charsel.h*.68);
  ctx.fillStyle='#334455';ctx.font=`${Math.min(W*.018,11)}px monospace`;
  ctx.fillText('ENTER:リトライ  ESC:キャラ選択',W/2,H*.94);
  scanlines();
}

// ================================================================
//  メインループ
// ================================================================
function draw(){
  ctx.save();
  if(isPortrait){
    // 縦持ちでも横向きゲームを表示: ctx内部で90度回転+スケール
    // 論理(x,y)→物理canvas(y*s, canvas.height-x*s) where s=canvas.width/H
    const s=canvas.width/H;
    ctx.translate(0,canvas.height);
    ctx.rotate(-Math.PI/2);
    ctx.scale(s,s);
  } else {
    const s=canvas.height/H;
    ctx.scale(s,s);
  }
  if(shakeDx||shakeDy)ctx.translate(Math.round(shakeDx),Math.round(shakeDy));
  if(state==='title')drawTitle();
  else if(state==='story')drawStory();
  else if(state==='charselect')drawCharSelect();
  else if(state==='play')drawPlay();
  else if(state==='stageclear')drawStageClear();
  else if(state==='gameover')drawGameOver();
  else if(state==='cutscene')drawCutscene();
  else if(state==='ending')drawEnding();
  ctx.restore();
}
function loop(){frameTime=Date.now();update();draw();requestAnimationFrame(loop);}
loop();
</script>
