function drawCircleBtn(b,held,bg,hbg,br,hbr,tc,lb){
  const cx=b.x+b.s/2, cy=b.y+b.s/2, r=b.s/2;
  ctx.save();
  // 外側グロー (押下時)
  if(held){
    ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(cx,cy,r+4,0,Math.PI*2);
    ctx.fillStyle=hbr;ctx.fill();
  }
  // 本体
  ctx.globalAlpha=held?0.92:0.36;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=held?hbg:bg;ctx.fill();
  // 上半分ハイライト (立体感)
  const grd=ctx.createLinearGradient(cx,cy-r,cx,cy+r);
  grd.addColorStop(0,`rgba(255,255,255,${held?0.22:0.10})`);
  grd.addColorStop(0.45,'rgba(255,255,255,0)');
  grd.addColorStop(1,`rgba(0,0,0,${held?0.25:0.15})`);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=grd;ctx.fill();
  // リング
  ctx.globalAlpha=held?0.9:0.45;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=held?hbr:br;ctx.lineWidth=held?2:1.5;ctx.stroke();
  // ラベル
  ctx.globalAlpha=1;
  ctx.fillStyle=held?'#ffffff':tc;
  ctx.font=`bold ${Math.floor(Math.min(r*.66,15))}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lb,cx,cy+1);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}
function drawBtns(){
  const z=getBtns();
  const jetOn=player&&player.jetActive&&Math.floor(Date.now()/60)%2;
  const o2r=player?player.oxygen/player.maxOxygen:1;
  const jetBg=o2r<0.25?'#1a0808':o2r<0.5?'#1a1008':'#081a12';
  const jetHbg=o2r<0.25?'#882200':o2r<0.5?'#885500':'#116644';
  const jetBr=o2r<0.25?'#441100':o2r<0.5?'#443300':'#224433';
  const jetHbr=o2r<0.25?'#ff4422':o2r<0.5?'#ffaa33':'#33ffaa';
  const jetTc=o2r<0.25?'#cc4433':o2r<0.5?'#cc9933':'#33bb88';
  const btns=[
    {b:z.left,  lb:'◀',   held:touchHeld.left||keys['ArrowLeft']||keys['a'],
     bg:'#0f1828',hbg:'#2244aa',br:'#334466',hbr:'#55aaff',tc:'#8899cc'},
    {b:z.right, lb:'▶',   held:touchHeld.right||keys['ArrowRight']||keys['d'],
     bg:'#0f1828',hbg:'#2244aa',br:'#334466',hbr:'#55aaff',tc:'#8899cc'},
    {b:z.jump,  lb:'JUMP',held:touchHeld.jumpHeld,
     bg:'#0a1a44',hbg:'#1144dd',br:'#2255aa',hbr:'#66aaff',tc:'#6699ee'},
    {b:z.atk,   lb:'ATK', held:false,
     bg:'#2a0a08',hbg:'#bb2200',br:'#662200',hbr:'#ff6644',tc:'#cc4422'},
    {b:z.jet,   lb:'JET', held:!!jetOn,
     bg:jetBg,hbg:jetHbg,br:jetBr,hbr:jetHbr,tc:jetTc},
  ];
  btns.forEach(({b,lb,held,bg,hbg,br,hbr,tc})=>{
    drawCircleBtn(b,held,bg,hbg,br,hbr,tc,lb);
  });
  // ATKクールダウン: 円弧で残量表示
  if(player&&player.atkCd>0){
    const cd=CHARS[player.ci].atkCd,b=z.atk;
    const cx=b.x+b.s/2,cy=b.y+b.s/2,r=b.s/2;
    const ratio=player.atkCd/cd;
    ctx.globalAlpha=0.55;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);
    ctx.closePath();ctx.fillStyle='#000';ctx.fill();
    ctx.globalAlpha=1;
  }
  // JETクールダウン: 円弧 + 残秒数
  if(player&&player.jetCd>0&&!player.jetActive){
    const b=z.jet;
    const cx=b.x+b.s/2,cy=b.y+b.s/2,r=b.s/2;
    const ratio=player.jetCd/180;
    ctx.globalAlpha=0.65;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);
    ctx.closePath();ctx.fillStyle='#000';ctx.fill();
    ctx.globalAlpha=1;
    // 残り秒数テキスト
    const secs=Math.ceil(player.jetCd/60);
    ctx.save();ctx.globalAlpha=0.92;
    ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.floor(r*.52)}px monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(secs,cx,cy+1);
    ctx.restore();
  }
  // コンボドット (ATKボタン上・丸ドット)
  if(player){
    const b=z.atk;
    const cx=b.x+b.s/2,cy=b.y-10;
    ctx.globalAlpha=player.comboTimer>0?.9:.28;
    for(let k=0;k<3;k++){
      const lit=player.comboTimer>0&&k<=player.comboStep;
      ctx.beginPath();ctx.arc(cx+(k-1)*13,cy,5,0,Math.PI*2);
      ctx.fillStyle=lit?'#ffcc00':'#333';ctx.fill();
      if(lit){ctx.beginPath();ctx.arc(cx+(k-1)*13,cy,3.5,0,Math.PI*2);ctx.fillStyle='#ffee88';ctx.fill();}
    }
    ctx.globalAlpha=1;
  }
}

  drawO2Tanks();
  // drops 描画
  drops.forEach(d=>{
    if(d.collected)return;
    const dx=Math.floor(d.x-cam.x);
    if(d.tp==='o2'){
      dr(dx,d.y,12,14,'#1a3355');dr(dx,d.y,12,2,'#4488aa');

      dr(dx+4,d.y,4,14,'#443300');dr(dx+5,d.y+1,2,12,g?'#ffee44':'#ccaa00');
      dr(dx+4,d.y+5,4,4,'#ffffff');

      dr(dx+3,d.y+2,6,8,'#aa2244');dr(dx+4,d.y,4,12,'#cc3355');
      if(Math.floor(Date.now()/300)%2)dr(dx+4,d.y+2,4,6,'#ff6688');
    }
  });
  effects.forEach(drawEffect);
  projectiles.forEach(p=>{
    const bx=Math.floor(p.x-cam.x),by=Math.floor(p.y);
    if(p.claw){
      // 狼: 3本の爪傷が飛ぶ
      const dir=p.vx>=0?1:-1;
      ctx.save();ctx.translate(bx+p.w/2,by+p.h/2);
      if(dir<0)ctx.scale(-1,1);
      const clawCols=['#aabbff','#ccddff','#ffffff'];
      for(let i=0;i<3;i++){
        const ox=(i-1)*5, slant=p.h*0.55;
        ctx.globalAlpha=i===1?0.95:0.7;
        ctx.strokeStyle=clawCols[i];ctx.lineWidth=i===1?2.5:1.8;
        ctx.beginPath();
        ctx.moveTo(p.w*0.45+ox, -p.h*0.5);
        ctx.lineTo(-p.w*0.35+ox,  p.h*0.5);
        ctx.stroke();
      }
      // グロウ
      ctx.globalAlpha=0.18;ctx.fillStyle='#8899ff';
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.globalAlpha=1;ctx.restore();
    }else if(p.slash){
      // 蟷螂: 鎌形(三日月)スラッシュ
      const dir=p.vx>=0?1:-1;
      const R=Math.max(p.w,p.h)*0.72;
      ctx.save();
      ctx.translate(bx+p.w/2,by+p.h/2);
      if(dir<0)ctx.scale(-1,1);
      // 外側グロウ
      ctx.globalAlpha=0.18;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(0,0,R+5,-Math.PI*.7,Math.PI*.7);ctx.arc(-R*.18,0,R*.52+5,Math.PI*.7,-Math.PI*.7,true);ctx.closePath();ctx.fill();
      // 鎌本体
      ctx.globalAlpha=0.92;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(0,0,R,-Math.PI*.7,Math.PI*.7);ctx.arc(-R*.18,0,R*.52,Math.PI*.7,-Math.PI*.7,true);ctx.closePath();ctx.fill();
      // 刃の光沢ライン
      ctx.globalAlpha=0.85;ctx.strokeStyle='#ccffee';ctx.lineWidth=1.8;
      ctx.beginPath();ctx.arc(0,0,R,-Math.PI*.68,Math.PI*.68);ctx.stroke();
      ctx.globalAlpha=0.4;ctx.strokeStyle='#ffffff';ctx.lineWidth=0.9;
      ctx.beginPath();ctx.arc(0,0,R-3,-Math.PI*.5,Math.PI*.5);ctx.stroke();
      ctx.globalAlpha=1;ctx.restore();
    }else if(p.arrow){
      // 鷹: 矢(矢羽根+矢軸+矢尻)
      const dir=p.vx>=0?1:-1;
      const tipX=dir>0?bx+p.w:bx;
      const tailX=dir>0?bx:bx+p.w;
      const cy2=by+Math.floor(p.h/2);
      // 矢羽根 (tail)
      const fw=dir>0?1:-1;
      dr(tailX,cy2-3,3,3,'#884400');dr(tailX,cy2+1,3,3,'#884400');
      dr(tailX-fw,cy2-4,2,2,'#bb6600');dr(tailX-fw,cy2+3,2,2,'#bb6600');
      // 矢軸
      dr(dir>0?bx+3:bx,cy2-1,p.w-6,3,'#7a4a12');
      dr(dir>0?bx+3:bx,cy2,p.w-6,1,'#c8803a');
      // 矢尻 (三角形状)
      ctx.fillStyle='#ffdd44';
      ctx.beginPath();
      ctx.moveTo(tipX,cy2);
      ctx.lineTo(tipX-dir*7,cy2-4);
      ctx.lineTo(tipX-dir*7,cy2+4);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#cc9922';
      ctx.beginPath();
      ctx.moveTo(tipX,cy2);
      ctx.lineTo(tipX-dir*7,cy2+4);
      ctx.lineTo(tipX-dir*5,cy2);
      ctx.closePath();ctx.fill();
    }else if(p.bomb){
      const s=p.w;
      // 弾道に合わせて回転
      ctx.save();ctx.translate(bx+s/2,by+s/2);
      const ballAngle=Math.atan2(p.vy,p.vx)+Math.PI/2;
      ctx.rotate(ballAngle);
      const r2=s/2;
      // 本体（丸い爆弾）
      ctx.beginPath();ctx.arc(0,0,r2,0,Math.PI*2);ctx.fillStyle='#3a3a1e';ctx.fill();
      ctx.beginPath();ctx.arc(0,0,r2-1,0,Math.PI*2);ctx.fillStyle='#555530';ctx.fill();
      ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(-r2*.3,-r2*.35,r2*.35,0,Math.PI*2);ctx.fillStyle='#888855';ctx.fill();ctx.globalAlpha=1;
      // 導火線（上方向）
      ctx.fillStyle='#774422';ctx.fillRect(-1,-r2-5,2,5);
      if(Math.floor(Date.now()/80)%2){ctx.fillStyle='#ffcc00';ctx.fillRect(-2,-r2-9,3,3);}
      else{ctx.fillStyle='#ff8800';ctx.fillRect(-1,-r2-8,2,2);}
      ctx.restore();
    }else if(p.needle){
      const dir=p.vx>=0?1:-1;
      dr(bx,by,p.w,p.h,'#0d6600');
      dr(bx,by,p.w,1,'#55ff22');
      ctx.globalAlpha=0.28;dr(bx-1,by-1,p.w+2,p.h+2,'#33ff00');ctx.globalAlpha=1;
      // Metallic tip
      const tx=dir>0?bx+p.w-2:bx;
      dr(tx,by,2,p.h,'#aaffaa');
      dr(dir>0?bx+p.w-1:bx,by+1,1,Math.max(1,p.h-2),'#ffffff');
    }else if(p.pierce&&p.w>=30){
      ctx.globalAlpha=0.35;dr(bx-2,by-3,p.w+4,p.h+6,p.col);ctx.globalAlpha=1;
      dr(bx,by,p.w,p.h,p.col);dr(bx,by+Math.floor(p.h*.35),p.w,Math.floor(p.h*.3),'#ffffff');
    }else if(p.homing){
      ctx.globalAlpha=0.4;dr(bx-2,by-2,p.w+4,p.h+4,p.col);ctx.globalAlpha=1;
      dr(bx,by,p.w,p.h,p.col);dr(bx+3,by+3,p.w-6,p.h-6,'#ccffaa');
    }else{
      dr(bx,by,p.w,p.h,p.col);if(p.w>4&&p.h>4)dr(bx+1,by+1,p.w-2,p.h-2,'#ffffff');
    }
  });
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/22);dr(Math.floor(p.x-cam.x),Math.floor(p.y),P,P,p.col);});ctx.globalAlpha=1;
  drawEnemies();
  if(boss&&boss.hp>0)drawBoss();
  if(player){
    // ジェットシールド (jetActive中は常に表示・点滅なし)
    if(player.jetActive){
      const scx=Math.floor(player.x-cam.x)+player.w/2;
      const scy=Math.floor(player.y)+player.h/2;
      const pulse=Math.sin(Date.now()*.022);
      const sr=player.w*1.1+pulse*4;
      const o2r=player.oxygen/player.maxOxygen;
      const sc=o2r>=0.5?'#5599ff':o2r>=0.25?'#ffaa44':'#ff5533';
      ctx.save();
      // 外リング光
      ctx.globalAlpha=0.18+pulse*.06;
      ctx.beginPath();ctx.arc(scx,scy,sr+8,0,Math.PI*2);
      const grd=ctx.createRadialGradient(scx,scy,sr*.2,scx,scy,sr+8);
      grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(0.65,sc+'33');grd.addColorStop(1,sc+'aa');
      ctx.fillStyle=grd;ctx.fill();
      // 縁ライン
      ctx.globalAlpha=0.55+pulse*.20;
      ctx.beginPath();ctx.arc(scx,scy,sr,0,Math.PI*2);
      ctx.strokeStyle=sc;ctx.lineWidth=2.5;ctx.stroke();
      // 六角形ハニカム模様 (シールド感)
      ctx.globalAlpha=0.22+pulse*.08;
      ctx.strokeStyle=sc;ctx.lineWidth=1;
      for(let a=0;a<6;a++){
        const ang=a*Math.PI/3+Date.now()*.0004;
        const x1=scx+Math.cos(ang)*(sr*.6),y1=scy+Math.sin(ang)*(sr*.6);
        const x2=scx+Math.cos(ang+Math.PI/3)*(sr*.6),y2=scy+Math.sin(ang+Math.PI/3)*(sr*.6);
        ctx.beginPath();ctx.moveTo(scx,scy);ctx.lineTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      }
      ctx.restore();
    }
    if(!(player.invincible>0&&!player.jetActive&&Math.floor(player.invincible/4)%2===0)){
      const atkAnim=player.atkCd>0?player.comboStep+1:0;
      drawCharacter(Math.floor(player.x-cam.x),Math.floor(player.y),player.ci,player.facing,player.frame,player.moving,atkAnim,player.jetActive);
    }
  }
  // damageNums 描画
  damageNums.forEach(d=>{
    ctx.globalAlpha=d.life/44;
    ctx.fillStyle=d.val>=3?'#ffee00':d.val>=2?'#ffaa44':'#ff8888';
    ctx.font=`bold ${11+d.val*2}px monospace`;ctx.textAlign='center';
    ctx.fillText(d.val,Math.floor(d.x-cam.x),Math.floor(d.y));
    ctx.globalAlpha=1;
  });
  // comboTexts 描画
  comboTexts.forEach(c=>{
    ctx.globalAlpha=c.life/45;
    ctx.fillStyle='#ffee00';ctx.strokeStyle='#884400';ctx.lineWidth=3;
    ctx.font=`bold ${Math.min(W*.038,20)}px monospace`;ctx.textAlign='center';
    ctx.strokeText('FINISH!!',Math.floor(c.x-cam.x),Math.floor(c.y));
    ctx.fillText('FINISH!!',Math.floor(c.x-cam.x),Math.floor(c.y));
    ctx.globalAlpha=1;
  });
  drawBtns();
  drawHUD();
  // ポーズオーバーレイ
  if(paused){
    ctx.fillStyle='rgba(0,0,20,0.72)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#cc44ff';ctx.font=`bold ${Math.min(W*.07,44)}px monospace`;
    ctx.fillText('PAUSE',W/2,H*.42);
    ctx.fillStyle='#6677aa';ctx.font=`${Math.min(W*.025,16)}px monospace`;
    ctx.fillText('▶ or P to resume',W/2,H*.55);
    ctx.fillStyle='#445566';ctx.font=`${Math.min(W*.018,12)}px monospace`;
    ctx.fillText('M = mute / ESC = pause',W/2,H*.63);
  }
  scanlines();
}

// ================================================================
//  ゲームオーバー
// ================================================================
function drawGameOver(){
  dr(0,0,W,H,'#000');
  STARS.forEach(s=>dr((s.x%W+W)%W,s.y,s.s,s.s,'#fff'));
  dr(0,0,W,H,'rgba(40,0,0,.75)');
  ctx.textAlign='center';
  ctx.fillStyle='#220000';ctx.font=`bold ${Math.min(W*.06,44)}px monospace`;ctx.fillText('MISSION FAILED',W/2+2,H*.35+2);
  ctx.fillStyle='#ff3333';ctx.fillText('MISSION FAILED',W/2,H*.35);
  ctx.fillStyle='#ffdd44';ctx.font=`bold ${Math.min(W*.03,24)}px monospace`;
  ctx.fillText('SCORE '+String(score).padStart(6,'0'),W/2,H*.5);
  ctx.fillStyle='#88aaff';ctx.font=`${Math.min(W*.02,14)}px monospace`;
  ctx.fillText('SHARDS: '+shardCount,W/2,H*.58);
  const scores=getScores();
  if(scores.length){
    ctx.fillStyle='#334455';ctx.font=`bold ${Math.min(W*.015,10)}px monospace`;ctx.textAlign='center';
    ctx.fillText('── BEST SCORES ──',W/2,H*.65);
    scores.forEach((s,i)=>{
      ctx.fillStyle=i===0?'#ffcc00':'#7788aa';
      ctx.font=`${Math.min(W*.014,10)}px monospace`;ctx.textAlign='center';
      ctx.fillText(`${i+1}. ${s.char}  ${String(s.score).padStart(7,'0')}  ${s.date}`,W/2,H*.70+i*16);
    });
  }
  if(Math.floor(Date.now()/500)%2){ctx.fillStyle='#aaaaff';ctx.font=`bold ${Math.min(W*.022,16)}px monospace`;ctx.fillText('PRESS START TO RETRY',W/2,H*.9);}
  scanlines();
}

// ================================================================
//  メインループ
// ================================================================
function draw(){
  ctx.save();
  if(isPortrait){
    // 縦持ちでも横向きゲームを表示: ctx内部で90度回転+スケール
    // 論理(x,y)→物理canvas(y*s, canvas.height-x*s) where s=canvas.width/H
    const s=canvas.width/H;
    ctx.translate(0,canvas.height);
    ctx.rotate(-Math.PI/2);
    ctx.scale(s,s);
  } else {
    const s=canvas.height/H;
    ctx.scale(s,s);
  }
  if(shakeDx||shakeDy)ctx.translate(Math.round(shakeDx),Math.round(shakeDy));
  if(state==='title')drawTitle();
  else if(state==='story')drawStory();
  else if(state==='charselect')drawCharSelect();
  else if(state==='play')drawPlay();
  else if(state==='stageclear')drawStageClear();
  else if(state==='gameover')drawGameOver();
  ctx.restore();
}
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
